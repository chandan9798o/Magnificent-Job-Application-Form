<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css" >
</head>
<body>
    <div class="container">
        <div class="apply_box">
            <h1>
                Job Application 
                <span class="title_small">(Web)</span>
            </h1>
            <hr>
            <br>
            <form action="">
    <div class="form_container">
        <div class="form_control">
            <label for="first_name">First Name</label>
            <input id="first_name" 
                   name="first_name" 
                   type="text"
                   placeholder="Enter first name.." 
                   required>
        </div>

        <div class="form_control">
            <label for="last_name">Last Name</label>
            <input id="last_name" 
                   name="last_name" 
                   type="text"
                   placeholder="Enter last name.." 
                   required>
        </div>

        <div class="form_control">
            <label for="email">Email</label>
            <input id="email" 
                   type="email" 
                   name="email"
                   placeholder="Enter your email.." 
                   required>
        </div>

        <div class="form_control">
            <label for="job_role">Job Role</label>
            <select id="job_role" name="job_role" required>
                <option value="">Select Job Role</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend">Backend Developer</option>
                <option value="full_stack">Full Stack Developer</option>
                <option value="ui_ux">UI/UX Designer</option>
                <option value="da">Data Analytics</option>
            </select>
        </div>

        <div class="textarea_control">
            <label for="address">Address</label>
            <textarea id="address" 
                      name="address" 
                      rows="4" 
                      placeholder="Enter your Address"
                      required></textarea>
        </div>

        <div class="form_control">
            <label for="city">City</label>
            <input id="city" type="text" name="city"placeholder="Enter your city" required>
        </div>
        <div class="form_control">
            <label for="pincode">Pincode</label>
            <input id="pincode" type="number" name="pincode"placeholder="Enter your pincode" required>
        </div>
        <div class="form_control">
            <label for="date">Date</label>
            <input value="" id="date" type="date" name="date">
        </div>
        <div class="form_control">
            <label for="upload">Upload your cv</label>
            <input value="" id="upload" type="file" name="upload">
        </div>
    </div>
    <div class="button_container">
        <button typw="submit">Apply Now</button>
    </div>
</form>
            
        </div>
    </div>
</body>
</html>
